services:
  - type: web
    name: CaseCommand
    runtime: docker
    dockerfilePath: ./Dockerfile
    repo: https://github.com/brettchapinferguson-boop/CaseCommand.git
    branch: main
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PORT
        value: 8000
    healthCheckPath: /api/health
