services:
  - type: web
    name: CaseCommand
    runtime: python
    buildCommand: |
      pip install -r backend/requirements.txt && mkdir -p backend/static && cp frontend/index.html backend/static/index.html && echo "Build complete: frontend copied to backend/static/"
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    repo: https://github.com/brettchapinferguson-boop/CaseCommand.git
    branch: main
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.11
    healthCheckPath: /api/health
