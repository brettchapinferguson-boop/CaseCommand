services:
  - type: web
    name: casecommand
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: BASE_URL
        sync: false
      - key: AUTH_TOKEN
        sync: false
      # Stripe billing
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_SOLO
        sync: false
      - key: STRIPE_PRICE_FIRM
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      # Telegram (optional)
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_USERS
        sync: false
      # Twilio SMS/WhatsApp (optional)
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: TWILIO_ALLOWED_NUMBERS
        sync: false
